name: staging-deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy"
        required: true
        default: "staging-latest"
      staging_url:
        description: "Public staging URL (e.g. https://staging.example.com)"
        required: true

jobs:
  preflight-release-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hammer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hammer"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/hammer
      AUTH_SESSION_SECRET: ci_super_secure_session_secret_with_more_than_32_chars
      AUTH_SESSION_TTL_HOURS: "12"
      E2E_BASE_URL: http://127.0.0.1:3000
      E2E_ADMIN_STORAGE_STATE: tests/e2e/.auth/admin.json
      E2E_CASHIER_STORAGE_STATE: tests/e2e/.auth/cashier.json
      E2E_ADMIN_USERNAME: supervisor.mga
      E2E_ADMIN_PASSWORD: ChangeMeNow!123
      E2E_CASHIER_USERNAME: caja.mga
      E2E_CASHIER_PASSWORD: ChangeMeNow!123
      PREVIOUS_METRICS_PATH: config/metrics/e2e-latency-baseline.json
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Install Playwright browser + deps
        run: npx playwright install --with-deps chromium
      - name: Run release check gate
        run: npm run release:check

  build-push:
    runs-on: ubuntu-latest
    needs: preflight-release-check
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: docker build -t ghcr.io/${{ github.repository }}:${{ github.event.inputs.image_tag }} .
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Push container image
        run: docker push ghcr.io/${{ github.repository }}:${{ github.event.inputs.image_tag }}
      - name: Capture image metadata
        id: meta
        run: echo "image=ghcr.io/${{ github.repository }}:${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-push
    if: ${{ secrets.STAGING_SSH_HOST != '' }}
    steps:
      - name: Deploy in staging host via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -euo pipefail
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ${{ needs.build-push.outputs.image }}
            docker stop hammer-staging || true
            docker rm hammer-staging || true
            docker run -d --name hammer-staging \
              --restart unless-stopped \
              -p 3000:3000 \
              -e APP_ENV=staging \
              -e DATABASE_URL='${{ secrets.STAGING_DATABASE_URL }}' \
              -e AUTH_SESSION_SECRET='${{ secrets.STAGING_AUTH_SESSION_SECRET }}' \
              -e AUTH_SESSION_TTL_HOURS='12' \
              -e E2E_BASE_URL='${{ github.event.inputs.staging_url }}' \
              -e E2E_ADMIN_STORAGE_STATE='tests/e2e/.auth/admin.json' \
              -e E2E_CASHIER_STORAGE_STATE='tests/e2e/.auth/cashier.json' \
              -e E2E_ADMIN_USERNAME='${{ secrets.STAGING_E2E_ADMIN_USERNAME }}' \
              -e E2E_ADMIN_PASSWORD='${{ secrets.STAGING_E2E_ADMIN_PASSWORD }}' \
              -e E2E_CASHIER_USERNAME='${{ secrets.STAGING_E2E_CASHIER_USERNAME }}' \
              -e E2E_CASHIER_PASSWORD='${{ secrets.STAGING_E2E_CASHIER_PASSWORD }}' \
              ${{ needs.build-push.outputs.image }}

  smoke-staging:
    runs-on: ubuntu-latest
    needs: [build-push, deploy-staging]
    if: ${{ always() && (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped') }}
    env:
      SMOKE_BASE_URL: ${{ github.event.inputs.staging_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Infra smoke
        run: SMOKE_REPORT_PATH=artifacts/smoke/infra-smoke.json npm run smoke:infra
      - name: Functional smoke
        run: SMOKE_REPORT_PATH=artifacts/smoke/functional-smoke.json npm run smoke:functional
      - name: Upload smoke reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-smoke-report
          path: artifacts/smoke/*.json
          if-no-files-found: warn
